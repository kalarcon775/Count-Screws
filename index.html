<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LUX Dataset" />
  <title>LUX Screw Dataset Collector</title>

  <style>
    :root {
      --lux-black: #231f20;
      --lux-green: #74b843;
      --lux-green-dark: #4f8f2f;
      --lux-gray: #e6e7e8;
      --lux-white: #ffffff;
      --lux-red: #b00020;
      --lux-yellow: #a66a00;

      font-family: Arial, Helvetica, sans-serif;
      color: var(--lux-black);
      background: var(--lux-gray);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--lux-gray);
    }

    .app {
      max-width: 1150px;
      margin: 0 auto;
      padding: 14px;
    }

    .header {
      background: var(--lux-black);
      color: white;
      padding: 18px 20px;
      border-left: 12px solid var(--lux-green);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }

    .lux {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .dynamics {
      font-size: 18px;
      color: #d8d8d8;
      font-weight: 600;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -3px;
      text-transform: uppercase;
    }

    .photoCountBox {
      text-align: right;
      min-width: 150px;
    }

    .photoCountBox span {
      display: block;
      font-size: 12px;
      color: #cfcfcf;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 800;
    }

    .photoCountBox strong {
      display: block;
      font-size: 36px;
      color: var(--lux-green);
      font-weight: 900;
      line-height: 1;
      margin-top: 4px;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    @media (min-width: 900px) {
      .main {
        grid-template-columns: 1.45fr 0.8fr;
      }
    }

    .cameraPanel {
      position: relative;
      background: #111;
      border: 8px solid var(--lux-black);
      overflow: hidden;
    }

    video {
      width: 100%;
      display: block;
      background: #111;
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .controls {
      background: white;
      padding: 18px;
      border-top: 8px solid var(--lux-green);
      box-shadow: 0 8px 22px rgba(35, 31, 32, 0.14);
    }

    .sectionTitle {
      margin: 0 0 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 900;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 900;
      margin-bottom: 7px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 14px 12px;
      font-size: 22px;
      font-weight: 800;
      border: 2px solid #cfd3d5;
      border-radius: 0;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: var(--lux-green);
      box-shadow: inset 0 -4px 0 var(--lux-green);
    }

    button {
      width: 100%;
      padding: 18px;
      border: 0;
      border-radius: 0;
      margin-top: 10px;
      color: white;
      background: var(--lux-black);
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    button.primary {
      background: var(--lux-green-dark);
    }

    button.secondary {
      background: #4a4d4f;
    }

    .status {
      margin-top: 16px;
      padding: 16px;
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      background: #f1f1f1;
      border-left: 10px solid var(--lux-yellow);
    }

    .status.good {
      background: #e7f3df;
      color: #255b16;
      border-left-color: var(--lux-green);
    }

    .status.bad {
      background: #ffe1e5;
      color: var(--lux-red);
      border-left-color: var(--lux-red);
    }

    .note {
      margin-top: 16px;
      padding: 14px;
      background: #f2f3f3;
      border-left: 6px solid var(--lux-green);
      font-size: 15px;
      line-height: 1.45;
      color: #333;
    }

    .previewPanel {
      margin-top: 14px;
      background: white;
      padding: 14px;
      border-left: 8px solid var(--lux-green);
      display: none;
    }

    .previewPanel img {
      width: 100%;
      display: block;
      border: 4px solid var(--lux-black);
      margin-top: 10px;
    }

    .log {
      margin-top: 14px;
      background: white;
      padding: 14px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid #ddd;
      padding: 8px 6px;
      white-space: nowrap;
    }

    th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #f0f1f1;
    }

    canvas {
      display: none;
    }

    @media (max-width: 700px) {
      .header {
        display: block;
      }

      .photoCountBox {
        text-align: left;
        margin-top: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <div>
        <div class="brand">
          <span class="lux">LUX</span>
          <span class="dynamics">dynamics</span>
        </div>
        <h1>Screw Dataset Collector</h1>
      </div>

      <div class="photoCountBox">
        <span>Photos Saved</span>
        <strong id="savedCount">0</strong>
      </div>
    </header>

    <section class="main">
      <div class="cameraPanel">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>

      <aside class="controls">
        <p class="sectionTitle">Training Photo Setup</p>

        <label for="trueCount">True Screw Count</label>
        <input id="trueCount" type="number" value="28" min="1" max="500" />

        <label for="packageId">Photo Set Name</label>
        <input id="packageId" type="text" value="lux_screws" />

        <button id="startCamera">Start Camera</button>
        <button id="capturePhoto" class="primary">Capture Training Photo</button>
        <button id="downloadCsv" class="secondary">Download CSV Log</button>
        <button id="clearLog" class="secondary">Clear Log</button>

        <div id="status" class="status">Ready</div>

        <div class="note">
          Take photos from the same iPad angle you want to use later. Change screw positions often. Include counts like 10, 25, 28, 50, 75, 99, 100, and 101.
        </div>
      </aside>
    </section>

    <section id="previewPanel" class="previewPanel">
      <strong>Last Captured Photo</strong>
      <img id="previewImage" alt="Last captured screw training photo" />
    </section>

    <section class="log">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Filename</th>
            <th>True Count</th>
            <th>Set</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </section>

    <canvas id="captureCanvas"></canvas>
  </main>

  <script>
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const overlayCtx = overlay.getContext("2d");

    const captureCanvas = document.getElementById("captureCanvas");
    const captureCtx = captureCanvas.getContext("2d");

    const trueCountInput = document.getElementById("trueCount");
    const packageIdInput = document.getElementById("packageId");

    const statusBox = document.getElementById("status");
    const savedCount = document.getElementById("savedCount");
    const logBody = document.getElementById("logBody");

    const previewPanel = document.getElementById("previewPanel");
    const previewImage = document.getElementById("previewImage");

    let log = [];

    loadLog();
    updateLogTable();

    document.getElementById("startCamera").addEventListener("click", startCamera);
    document.getElementById("capturePhoto").addEventListener("click", capturePhoto);
    document.getElementById("downloadCsv").addEventListener("click", downloadCsv);
    document.getElementById("clearLog").addEventListener("click", clearLog);

    window.addEventListener("resize", drawOverlay);

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = resolve;
        });

        await video.play();

        statusBox.textContent = "Camera Ready";
        statusBox.className = "status good";

        drawOverlay();
      } catch (error) {
        statusBox.textContent = "Camera Blocked";
        statusBox.className = "status bad";
        console.error(error);
      }
    }

    function capturePhoto() {
      if (!video.videoWidth || !video.videoHeight) {
        statusBox.textContent = "Start Camera First";
        statusBox.className = "status bad";
        return;
      }

      const trueCount = Number(trueCountInput.value);

      if (!trueCount || trueCount < 1) {
        statusBox.textContent = "Enter True Count";
        statusBox.className = "status bad";
        return;
      }

      const setName = cleanFileName(packageIdInput.value || "lux_screws");
      const timestamp = makeTimestamp();
      const filename = `${setName}_count-${trueCount}_${timestamp}.jpg`;

      captureCanvas.width = video.videoWidth;
      captureCanvas.height = video.videoHeight;

      captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);

      captureCanvas.toBlob(blob => {
        if (!blob) {
          statusBox.textContent = "Capture Failed";
          statusBox.className = "status bad";
          return;
        }

        const url = URL.createObjectURL(blob);

        const downloadLink = document.createElement("a");
        downloadLink.href = url;
        downloadLink.download = filename;
        downloadLink.click();

        previewImage.src = url;
        previewPanel.style.display = "block";

        const row = {
          time: new Date().toLocaleString(),
          filename,
          trueCount,
          setName
        };

        log.unshift(row);
        saveLog();
        updateLogTable();

        statusBox.textContent = "Photo Saved";
        statusBox.className = "status good";
      }, "image/jpeg", 0.92);
    }

    function downloadCsv() {
      if (!log.length) {
        statusBox.textContent = "No Log Yet";
        statusBox.className = "status bad";
        return;
      }

      const lines = [
        "time,filename,true_count,set_name"
      ];

      for (const row of log) {
        lines.push([
          csv(row.time),
          csv(row.filename),
          row.trueCount,
          csv(row.setName)
        ].join(","));
      }

      const blob = new Blob([lines.join("\n")], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "lux_screw_dataset_log.csv";
      link.click();

      URL.revokeObjectURL(url);

      statusBox.textContent = "CSV Downloaded";
      statusBox.className = "status good";
    }

    function clearLog() {
      const confirmClear = confirm("Clear the saved photo log on this iPad? This does not delete downloaded images.");

      if (!confirmClear) {
        return;
      }

      log = [];
      saveLog();
      updateLogTable();

      statusBox.textContent = "Log Cleared";
      statusBox.className = "status";
    }

    function drawOverlay() {
      const rect = video.getBoundingClientRect();

      if (!rect.width || !rect.height) {
        return;
      }

      overlay.width = Math.round(rect.width);
      overlay.height = Math.round(rect.height);

      overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

      const marginX = overlay.width * 0.07;
      const marginY = overlay.height * 0.07;

      const x = marginX;
      const y = marginY;
      const w = overlay.width - marginX * 2;
      const h = overlay.height - marginY * 2;

      overlayCtx.lineWidth = 5;
      overlayCtx.strokeStyle = "rgba(116, 184, 67, 0.96)";
      overlayCtx.strokeRect(x, y, w, h);

      overlayCtx.fillStyle = "rgba(116, 184, 67, 0.96)";
      overlayCtx.font = "22px Arial";
      overlayCtx.fillText("Keep screws inside this area", x + 12, Math.max(30, y - 12));
    }

    function updateLogTable() {
      savedCount.textContent = String(log.length);
      logBody.innerHTML = "";

      for (const row of log.slice(0, 40)) {
        const tr = document.createElement("tr");

        const values = [
          row.time,
          row.filename,
          row.trueCount,
          row.setName
        ];

        for (const value of values) {
          const td = document.createElement("td");
          td.textContent = value;
          tr.appendChild(td);
        }

        logBody.appendChild(tr);
      }
    }

    function saveLog() {
      localStorage.setItem("luxScrewDatasetLog", JSON.stringify(log));
    }

    function loadLog() {
      try {
        log = JSON.parse(localStorage.getItem("luxScrewDatasetLog") || "[]");
      } catch {
        log = [];
      }
    }

    function makeTimestamp() {
      const now = new Date();

      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const h = String(now.getHours()).padStart(2, "0");
      const min = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");

      return `${y}${m}${d}_${h}${min}${s}`;
    }

    function cleanFileName(text) {
      return text
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "") || "lux_screws";
    }

    function csv(value) {
      const text = String(value);

      if (text.includes(",") || text.includes('"') || text.includes("\n")) {
        return '"' + text.replaceAll('"', '""') + '"';
      }

      return text;
    }
  </script>
</body>
</html>
