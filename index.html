<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LUX Counter" />
  <title>LUX Fastener Counter</title>

  <style>
    :root {
      --lux-black: #231f20;
      --lux-dark: #111111;
      --lux-gray: #e6e7e8;
      --lux-gray-2: #cfd3d5;
      --lux-white: #ffffff;
      --lux-green: #74b843;
      --lux-green-dark: #4f8f2f;
      --lux-red: #b00020;
      --lux-yellow: #a66a00;

      font-family: Arial, Helvetica, sans-serif;
      color: var(--lux-black);
      background: var(--lux-gray);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--lux-gray);
    }

    .app {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      background: var(--lux-black);
      color: var(--lux-white);
      padding: 18px 22px;
      border-left: 12px solid var(--lux-green);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }

    .brand .lux {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .brand .dynamics {
      font-size: 18px;
      color: #d8d8d8;
      font-weight: 600;
    }

    .brandMark {
      width: 34px;
      height: 22px;
      position: relative;
      display: inline-block;
      transform: translateY(4px);
    }

    .brandMark::before,
    .brandMark::after {
      content: "";
      position: absolute;
      top: 0;
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 21px solid var(--lux-green);
    }

    .brandMark::before {
      left: 0;
    }

    .brandMark::after {
      left: 13px;
      opacity: 0.6;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 60px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -3px;
      text-transform: uppercase;
    }

    .headerStatus {
      text-align: right;
      min-width: 170px;
    }

    .headerStatus span {
      display: block;
      font-size: 12px;
      color: #c8c8c8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 800;
    }

    .headerStatus strong {
      display: block;
      font-size: 32px;
      color: var(--lux-green);
      font-weight: 900;
      line-height: 1;
      margin-top: 6px;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    @media (min-width: 900px) {
      .main {
        grid-template-columns: 1.55fr 0.75fr;
      }
    }

    .cameraPanel {
      position: relative;
      background: var(--lux-dark);
      border: 8px solid var(--lux-black);
      min-height: 520px;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      min-height: 520px;
      display: block;
      object-fit: cover;
      background: var(--lux-dark);
    }

    canvas#overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .resultHUD {
      position: absolute;
      left: 18px;
      top: 18px;
      background: rgba(255, 255, 255, 0.94);
      border-left: 10px solid var(--lux-yellow);
      padding: 16px;
      min-width: 230px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      z-index: 4;
    }

    .resultHUD.pass {
      border-left-color: var(--lux-green);
    }

    .resultHUD.fail {
      border-left-color: var(--lux-red);
    }

    .count {
      font-size: 64px;
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: -4px;
      color: var(--lux-black);
    }

    .hudLine {
      margin-top: 8px;
      font-size: 15px;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 1px;
      color: #444;
    }

    .controls {
      background: var(--lux-white);
      border-top: 8px solid var(--lux-green);
      padding: 18px;
      box-shadow: 0 8px 24px rgba(35, 31, 32, 0.12);
    }

    .sectionTitle {
      margin: 0 0 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 900;
      color: var(--lux-black);
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 900;
      margin-bottom: 7px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 14px 12px;
      font-size: 22px;
      font-weight: 800;
      border: 2px solid var(--lux-gray-2);
      border-radius: 0;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: var(--lux-green);
      box-shadow: inset 0 -4px 0 var(--lux-green);
    }

    button {
      width: 100%;
      padding: 18px;
      border: 0;
      border-radius: 0;
      margin-top: 10px;
      color: white;
      background: var(--lux-black);
      font-size: 17px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    button.primary {
      background: var(--lux-green-dark);
    }

    .status {
      margin-top: 16px;
      padding: 16px;
      font-size: 24px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      background: #f1f1f1;
      border-left: 10px solid var(--lux-yellow);
    }

    .status.pass {
      background: #e7f3df;
      color: #255b16;
      border-left-color: var(--lux-green);
    }

    .status.fail {
      background: #ffe1e5;
      color: var(--lux-red);
      border-left-color: var(--lux-red);
    }

    .note {
      margin-top: 16px;
      padding: 14px;
      background: #f2f3f3;
      border-left: 6px solid var(--lux-green);
      font-size: 15px;
      line-height: 1.45;
      color: #333;
    }

    .warnings {
      margin: 12px 0 0;
      padding-left: 20px;
      color: #6b4a00;
      font-size: 15px;
      line-height: 1.4;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 700px) {
      .app {
        padding: 10px;
      }

      .header {
        grid-template-columns: 1fr;
      }

      .headerStatus {
        text-align: left;
      }

      .cameraPanel {
        min-height: 420px;
      }

      video {
        min-height: 420px;
      }

      .count {
        font-size: 52px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <div>
        <div class="brand">
          <span class="lux">LUX</span>
          <span class="dynamics">dynamics</span>
          <span class="brandMark"></span>
        </div>
        <h1>Fastener Counter</h1>
      </div>

      <div class="headerStatus">
        <span>Target</span>
        <strong id="targetHeader">100</strong>
      </div>
    </header>

    <section class="main">
      <div class="cameraPanel">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>

        <div id="hud" class="resultHUD">
          <div class="count" id="countReadout">0</div>
          <div class="hudLine">Target: <span id="targetReadout">100</span></div>
          <div class="hudLine">Difference: <span id="differenceReadout">0</span></div>
          <div class="hudLine">Confidence: <span id="confidenceReadout">0%</span></div>
        </div>
      </div>

      <aside class="controls">
        <p class="sectionTitle">Pack Verification</p>

        <label for="targetInput">Target Count</label>
        <input id="targetInput" type="number" value="100" min="1" max="500" />

        <label for="packageInput">Package ID</label>
        <input id="packageInput" type="text" placeholder="Optional" />

        <button id="startButton">Start Camera</button>
        <button id="scanButton" class="primary">Scan Screws</button>

        <div id="status" class="status">Ready</div>
        <ul id="warnings" class="warnings"></ul>

        <div class="note">
          Use a matte black mat. Spread screws apart. This version rejects tiny glare spots and does not estimate touching screws.
        </div>
      </aside>
    </section>

    <canvas id="workCanvas" class="hidden"></canvas>
  </main>

  <script>
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const overlayCtx = overlay.getContext("2d");

    const workCanvas = document.getElementById("workCanvas");
    const workCtx = workCanvas.getContext("2d", { willReadFrequently: true });

    const targetInput = document.getElementById("targetInput");
    const packageInput = document.getElementById("packageInput");

    const targetHeader = document.getElementById("targetHeader");
    const targetReadout = document.getElementById("targetReadout");
    const countReadout = document.getElementById("countReadout");
    const differenceReadout = document.getElementById("differenceReadout");
    const confidenceReadout = document.getElementById("confidenceReadout");

    const hud = document.getElementById("hud");
    const statusBox = document.getElementById("status");
    const warningsBox = document.getElementById("warnings");

    const ROI_MARGIN = 0.06;
    const WORK_WIDTH = 640;

    let lastResult = null;

    targetInput.addEventListener("input", updateTargetLabels);
    document.getElementById("startButton").addEventListener("click", startCamera);
    document.getElementById("scanButton").addEventListener("click", scan);

    window.addEventListener("resize", drawEmptyOverlay);

    updateTargetLabels();
    drawStartupOverlay();

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = resolve;
        });

        await video.play();

        statusBox.textContent = "Camera Ready";
        statusBox.className = "status";
        drawEmptyOverlay();
      } catch (error) {
        statusBox.textContent = "Camera Blocked";
        statusBox.className = "status fail";
        warningsBox.innerHTML = "<li>Open this page through HTTPS and allow camera access.</li>";
        console.error(error);
      }
    }

    function scan() {
      if (!video.videoWidth || !video.videoHeight) {
        statusBox.textContent = "Start Camera First";
        statusBox.className = "status fail";
        return;
      }

      const result = analyzeVideoFrame();
      lastResult = result;

      updateResult(result);
      drawResultOverlay(result);
    }

    function analyzeVideoFrame() {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;

      const roi = {
        x: Math.round(sourceWidth * ROI_MARGIN),
        y: Math.round(sourceHeight * ROI_MARGIN),
        w: Math.round(sourceWidth * (1 - ROI_MARGIN * 2)),
        h: Math.round(sourceHeight * (1 - ROI_MARGIN * 2))
      };

      const scale = WORK_WIDTH / roi.w;
      const workWidth = WORK_WIDTH;
      const workHeight = Math.round(roi.h * scale);

      workCanvas.width = workWidth;
      workCanvas.height = workHeight;

      workCtx.drawImage(
        video,
        roi.x,
        roi.y,
        roi.w,
        roi.h,
        0,
        0,
        workWidth,
        workHeight
      );

      const image = workCtx.getImageData(0, 0, workWidth, workHeight);
      const gray = toGrayscale(image.data, workWidth, workHeight);
      const smooth = blur3x3(gray, workWidth, workHeight);

      const threshold = calculateThreshold(smooth);
      const binary = createBinaryMask(smooth, threshold);
      const cleaned = cleanMask(binary, workWidth, workHeight);

      const componentsRaw = findComponents(cleaned, workWidth, workHeight);

      const sizeModel = estimateScrewSize(componentsRaw, workWidth, workHeight);

      const components = componentsRaw
        .filter(component => isScrewLike(component, sizeModel))
        .sort((a, b) => a.minY - b.minY || a.minX - b.minX);

      const target = Number(targetInput.value);
      const count = components.length;
      const difference = count - target;
      const rejected = componentsRaw.length - components.length;
      const confidence = estimateConfidence(count, target, rejected, components);

      const warnings = [];

      if (components.length === 0) {
        warnings.push("No screws detected. Use a dark matte mat and softer lighting.");
      }

      if (rejected > 40) {
        warnings.push("Many tiny bright spots were rejected. Reduce glare.");
      }

      if (confidence < 80) {
        warnings.push("Low confidence. Spread screws apart and rescan.");
      }

      if (difference < 0) {
        warnings.push("Count is below target.");
      }

      if (difference > 0) {
        warnings.push("Count is above target.");
      }

      return {
        roi,
        workWidth,
        workHeight,
        components,
        rejected,
        target,
        count,
        difference,
        confidence,
        threshold,
        warnings
      };
    }

    function toGrayscale(pixels, width, height) {
      const gray = new Uint8Array(width * height);

      for (let i = 0, p = 0; i < pixels.length; i += 4, p++) {
        const r = pixels[i];
        const g = pixels[i + 1];
        const b = pixels[i + 2];

        gray[p] = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
      }

      return gray;
    }

    function blur3x3(gray, width, height) {
      const output = new Uint8Array(gray.length);

      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          let sum = 0;

          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              sum += gray[(y + dy) * width + (x + dx)];
            }
          }

          output[y * width + x] = Math.round(sum / 9);
        }
      }

      return output;
    }

    function calculateThreshold(gray) {
      const hist = new Array(256).fill(0);

      for (let i = 0; i < gray.length; i += 2) {
        hist[gray[i]]++;
      }

      let total = 0;
      let sum = 0;

      for (let i = 0; i < 256; i++) {
        total += hist[i];
        sum += i * hist[i];
      }

      let sumB = 0;
      let wB = 0;
      let maxVariance = -1;
      let otsu = 125;

      for (let t = 0; t < 256; t++) {
        wB += hist[t];

        if (wB === 0) {
          continue;
        }

        const wF = total - wB;

        if (wF === 0) {
          break;
        }

        sumB += t * hist[t];

        const mB = sumB / wB;
        const mF = (sum - sumB) / wF;
        const variance = wB * wF * (mB - mF) * (mB - mF);

        if (variance > maxVariance) {
          maxVariance = variance;
          otsu = t;
        }
      }

      let mean = 0;

      for (let i = 0; i < gray.length; i += 3) {
        mean += gray[i];
      }

      mean = mean / Math.ceil(gray.length / 3);

      let variance = 0;

      for (let i = 0; i < gray.length; i += 3) {
        const d = gray[i] - mean;
        variance += d * d;
      }

      const std = Math.sqrt(variance / Math.ceil(gray.length / 3));
      const adaptive = mean + std * 0.65;

      return Math.max(75, Math.min(210, Math.round(Math.max(otsu, adaptive))));
    }

    function createBinaryMask(gray, threshold) {
      const binary = new Uint8Array(gray.length);

      for (let i = 0; i < gray.length; i++) {
        if (gray[i] >= threshold) {
          binary[i] = 1;
        }
      }

      return binary;
    }

    function cleanMask(binary, width, height) {
      let output = removeLonelyPixels(binary, width, height);
      output = dilate(output, width, height);
      output = erode(output, width, height);
      output = removeLonelyPixels(output, width, height);

      return output;
    }

    function removeLonelyPixels(binary, width, height) {
      const output = new Uint8Array(binary.length);

      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const index = y * width + x;

          if (!binary[index]) {
            continue;
          }

          let neighbors = 0;

          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (binary[(y + dy) * width + (x + dx)]) {
                neighbors++;
              }
            }
          }

          if (neighbors >= 4) {
            output[index] = 1;
          }
        }
      }

      return output;
    }

    function dilate(binary, width, height) {
      const output = new Uint8Array(binary.length);

      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const index = y * width + x;

          if (
            binary[index] ||
            binary[index - 1] ||
            binary[index + 1] ||
            binary[index - width] ||
            binary[index + width]
          ) {
            output[index] = 1;
          }
        }
      }

      return output;
    }

    function erode(binary, width, height) {
      const output = new Uint8Array(binary.length);

      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const index = y * width + x;

          if (
            binary[index] &&
            binary[index - 1] &&
            binary[index + 1] &&
            binary[index - width] &&
            binary[index + width]
          ) {
            output[index] = 1;
          }
        }
      }

      return output;
    }

    function findComponents(binary, width, height) {
      const visited = new Uint8Array(width * height);
      const components = [];

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const start = y * width + x;

          if (!binary[start] || visited[start]) {
            continue;
          }

          const stack = [start];
          visited[start] = 1;

          let area = 0;
          let minX = x;
          let maxX = x;
          let minY = y;
          let maxY = y;

          while (stack.length) {
            const index = stack.pop();
            area++;

            const cx = index % width;
            const cy = Math.floor(index / width);

            if (cx < minX) minX = cx;
            if (cx > maxX) maxX = cx;
            if (cy < minY) minY = cy;
            if (cy > maxY) maxY = cy;

            const neighbors = [
              index - 1,
              index + 1,
              index - width,
              index + width
            ];

            for (const next of neighbors) {
              if (next < 0 || next >= binary.length) {
                continue;
              }

              if (binary[next] && !visited[next]) {
                visited[next] = 1;
                stack.push(next);
              }
            }
          }

          const boxWidth = maxX - minX + 1;
          const boxHeight = maxY - minY + 1;
          const boxArea = boxWidth * boxHeight;
          const aspect = Math.max(boxWidth, boxHeight) / Math.max(1, Math.min(boxWidth, boxHeight));
          const density = area / Math.max(1, boxArea);

          components.push({
            area,
            minX,
            maxX,
            minY,
            maxY,
            boxWidth,
            boxHeight,
            aspect,
            density
          });
        }
      }

      return components;
    }

    function estimateScrewSize(components, width, height) {
      const imageArea = width * height;

      const possible = components
        .filter(c => {
          return (
            c.area > imageArea * 0.00025 &&
            c.area < imageArea * 0.025 &&
            c.boxWidth >= 6 &&
            c.boxHeight >= 6 &&
            c.aspect <= 14 &&
            c.density >= 0.08 &&
            c.density <= 0.85
          );
        })
        .map(c => c.area)
        .sort((a, b) => a - b);

      if (possible.length < 3) {
        return {
          minArea: Math.max(90, Math.round(imageArea * 0.00045)),
          maxArea: Math.max(1200, Math.round(imageArea * 0.015))
        };
      }

      const median = possible[Math.floor(possible.length / 2)];

      return {
        minArea: Math.max(80, Math.round(median * 0.35)),
        maxArea: Math.max(500, Math.round(median * 3.0))
      };
    }

    function isScrewLike(component, sizeModel) {
      if (component.area < sizeModel.minArea) {
        return false;
      }

      if (component.area > sizeModel.maxArea) {
        return false;
      }

      if (component.boxWidth < 6 || component.boxHeight < 6) {
        return false;
      }

      if (component.aspect > 14) {
        return false;
      }

      if (component.density < 0.08) {
        return false;
      }

      if (component.density > 0.9 && component.area < sizeModel.minArea * 1.6) {
        return false;
      }

      return true;
    }

    function estimateConfidence(count, target, rejected, components) {
      let confidence = 96;

      if (count === 0) {
        return 0;
      }

      if (rejected > 60) {
        confidence -= 24;
      } else if (rejected > 30) {
        confidence -= 12;
      }

      const veryLong = components.filter(c => c.aspect > 10).length;

      confidence -= veryLong * 3;

      if (Math.abs(count - target) > 10) {
        confidence -= 8;
      }

      return Math.max(10, Math.min(99, Math.round(confidence)));
    }

    function updateResult(result) {
      countReadout.textContent = result.count;
      targetReadout.textContent = result.target;
      targetHeader.textContent = result.target;
      differenceReadout.textContent = result.difference;
      confidenceReadout.textContent = result.confidence + "%";

      if (result.difference === 0 && result.confidence >= 80) {
        statusBox.textContent = "Pass";
        statusBox.className = "status pass";
        hud.className = "resultHUD pass";
      } else if (result.difference < 0) {
        statusBox.textContent = "Missing " + Math.abs(result.difference);
        statusBox.className = "status fail";
        hud.className = "resultHUD fail";
      } else {
        statusBox.textContent = "Remove " + result.difference;
        statusBox.className = "status fail";
        hud.className = "resultHUD fail";
      }

      warningsBox.innerHTML = "";

      for (const warning of result.warnings) {
        const li = document.createElement("li");
        li.textContent = warning;
        warningsBox.appendChild(li);
      }
    }

    function drawStartupOverlay() {
      setTimeout(drawEmptyOverlay, 50);
    }

    function drawEmptyOverlay() {
      const rect = video.getBoundingClientRect();

      if (!rect.width || !rect.height) {
        return;
      }

      overlay.width = Math.round(rect.width);
      overlay.height = Math.round(rect.height);

      overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

      const x = overlay.width * ROI_MARGIN;
      const y = overlay.height * ROI_MARGIN;
      const w = overlay.width * (1 - ROI_MARGIN * 2);
      const h = overlay.height * (1 - ROI_MARGIN * 2);

      overlayCtx.lineWidth = 5;
      overlayCtx.strokeStyle = "rgba(116, 184, 67, 0.95)";
      overlayCtx.strokeRect(x, y, w, h);

      overlayCtx.fillStyle = "rgba(116, 184, 67, 0.95)";
      overlayCtx.font = "22px Arial";
      overlayCtx.fillText("Scan Area", x + 12, Math.max(30, y - 12));
    }

    function drawResultOverlay(result) {
      drawEmptyOverlay();

      const rect = video.getBoundingClientRect();

      const displayRoiX = rect.width * ROI_MARGIN;
      const displayRoiY = rect.height * ROI_MARGIN;
      const displayRoiW = rect.width * (1 - ROI_MARGIN * 2);
      const displayRoiH = rect.height * (1 - ROI_MARGIN * 2);

      const scaleX = displayRoiW / WORK_WIDTH;
      const scaleY = displayRoiH / result.workHeight;

      overlayCtx.lineWidth = 2;
      overlayCtx.strokeStyle = "#74b843";
      overlayCtx.fillStyle = "#74b843";
      overlayCtx.font = "14px Arial";

      result.components.forEach((c, index) => {
        const x = displayRoiX + c.minX * scaleX;
        const y = displayRoiY + c.minY * scaleY;
        const w = c.boxWidth * scaleX;
        const h = c.boxHeight * scaleY;

        overlayCtx.strokeRect(x, y, w, h);
        overlayCtx.fillText(String(index + 1), x, Math.max(0, y - 16));
      });
    }

    function updateTargetLabels() {
      targetReadout.textContent = targetInput.value;
      targetHeader.textContent = targetInput.value;
    }
  </script>
</body>
